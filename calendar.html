<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AA Scooters — Bike Returns Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="nav.js" defer></script>
<style>
  :root{
    --sand:#F5EFE6;
    --ink:#1A2421;
    --petrol:#0F3D3E;
    --petrol-light:#175A5B;
    --cone:#FF6B35;
    --card:#FFFFFF;
    --line:#DED4C2;
    --muted:#5A6663;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .page-head{
    max-width:960px;
    margin:0 auto;
    padding:26px 16px 4px;
    text-align:center;
  }
  .page-head h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:28px;
    color:var(--petrol);
    margin:0;
  }
  .page-head .sub{
    color:var(--muted);
    font-size:13px;
    margin-top:6px;
  }
  main{
    max-width:960px;
    margin:0 auto;
    padding:24px 16px 60px;
  }
  .cal-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 16px rgba(15,61,62,.06);
  }
  .cal-card iframe{
    display:block;
    width:100%;
    height:680px;
    border:0;
  }
  .cal-note{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
    padding:0 2px;
  }
  .cal-note .hint{
    font-size:12px;
    color:var(--muted);
  }
  .cal-note a{
    font-size:12.5px;
    color:var(--petrol);
    text-decoration:none;
    font-weight:600;
  }
  .cal-note a:hover{ text-decoration:underline; }
  @media (max-width:640px){
    .cal-card iframe{ height:540px; }
  }
</style>
</head>
<body>

<div id="topbar-mount"></div>

<div class="page-head">
  <h1>Bike Returns Calendar</h1>
  <div class="sub">Every rented bike's due-back date &amp; time, synced automatically from the customer sheet</div>
</div>

<main>
  <div class="cal-card">
    <iframe
      src="https://calendar.google.com/calendar/embed?src=aascooterchiangmai%40gmail.com&ctz=Asia%2FBangkok&mode=AGENDA&showTitle=0&showPrint=0&showTabs=1&showCalendars=0&showTz=0"
      frameborder="0"
      scrolling="no">
    </iframe>
  </div>
  <div class="cal-note">
    <span class="hint">This calendar is shared by link — anyone with the link can view it, no Google login needed.</span>
    <a href="https://calendar.google.com/calendar/r?cid=aascooterchiangmai%40gmail.com" target="_blank" rel="noopener">Open in Google Calendar ↗</a>
  </div>
</main>

</body>
</html>
